services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-blogweb}\" -d \"$${POSTGRES_DB:-blogweb}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DB_ENGINE: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - static_volume:/var/www/blogweb/static:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
